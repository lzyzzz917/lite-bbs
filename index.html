<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專業輕量化電子佈告欄 (SPA)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
        }

        .post-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .post-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }

        .app-view {
            display: none;
        }

        .app-view.active {
            display: block;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: 1050;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>

    <div id="loading-overlay" class="d-none">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div id="view-login" class="container mt-5 app-view active">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">系統登入</h3>
                        <form id="form-login">
                            <div class="mb-3">
                                <label class="form-label">帳號</label>
                                <input type="text" class="form-control" id="login-acc" required
                                    placeholder="輸入 user 或 admin">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">密碼</label>
                                <input type="password" class="form-control" id="login-pass" required
                                    placeholder="輸入 1234">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">登入</button>
                            <div class="text-center">
                                <a href="#" id="link-to-register" class="text-decoration-none">還沒有帳號？點此註冊</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="view-register" class="container mt-5 app-view">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">帳號註冊</h3>
                        <form id="form-register">
                            <div class="mb-3">
                                <label class="form-label">選擇欲註冊的帳號</label>
                                <input type="text" class="form-control" required placeholder="設定帳號">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">設定密碼</label>
                                <input type="password" class="form-control" required placeholder="設定密碼">
                            </div>
                            <button type="submit" class="btn btn-success w-100 mb-3">完成註冊</button>
                            <div class="text-center">
                                <a href="#" id="link-to-login" class="text-decoration-none">已有帳號？返回登入</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="view-bbs" class="app-view">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="#">LiteBBS</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <form class="d-flex mx-auto w-50" onsubmit="return false;">
                        <input class="form-control me-2" type="search" id="search-input" placeholder="搜尋文章標題或內容...">
                    </form>
                    <div class="d-flex align-items-center gap-3">
                        <span class="text-light" id="user-info-badge"></span>
                        <button class="btn btn-primary btn-sm" id="btn-new-post" data-bs-toggle="modal"
                            data-bs-target="#postModal">發布文章</button>
                        <button class="btn btn-outline-light btn-sm" id="btn-logout">登出</button>
                    </div>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row" id="post-list">
            </div>
        </div>
    </div>

    <div class="modal fade" id="postModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title">新增文章</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="post-form">
                        <input type="hidden" id="post-id">
                        <div class="mb-3">
                            <label class="form-label">標題</label>
                            <input type="text" class="form-control" id="post-title" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">內容</label>
                            <textarea class="form-control" id="post-content" rows="5" required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="btn-save-post">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        const CONFIG = {
            token: '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',
            owner: 'lzyzzz917',
            repo: 'lite-bbs',
            path: 'db.json'
        };

        const State = {
            posts: [],
            currentSha: '',
            currentUser: null,
            role: 'guest'
        };
        const Auth = {

            mockDB: {
                'user': { pass: '1234', role: 'user', name: '一般使用者' },
                'admin': { pass: '1234', role: 'admin', name: '系統管理員' }
            },
            login(acc, pass) {
                const userRecord = this.mockDB[acc];
                if (userRecord && userRecord.pass === pass) {
                    State.currentUser = acc;
                    State.role = userRecord.role;
                    return true;
                }
                return false;
            },
            logout() {
                State.currentUser = null;
                State.role = 'guest';
                State.posts = [];
            }
        };

        const ViewManager = {
            show(viewId) {
                $('.app-view').removeClass('active');
                $(`#${viewId}`).addClass('active');
            }
        };

        const Base64Helper = {
            encode: (str) => btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode('0x' + p1))),
            decode: (str) => decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''))
        };

        const GitHubAPI = {
            getBaseUrl: () => `https://api.github.com/repos/${CONFIG.owner}/${CONFIG.repo}/contents/${CONFIG.path}`,

            async fetch() {
                try {
                    $('#loading-overlay').removeClass('d-none');
                    const res = await $.ajax({
                        url: `${this.getBaseUrl()}?t=${new Date().getTime()}`,
                        method: 'GET',
                        headers: { "Authorization": `Bearer ${CONFIG.token}` }
                    });
                    State.currentSha = res.sha;
                    const decodedStr = Base64Helper.decode(res.content);
                    State.posts = JSON.parse(decodedStr).posts || [];
                    BBS.render();
                } catch (error) {
                    alert('資料讀取失敗，請檢查 GitHub 設定。');
                    console.error(error);
                } finally {
                    $('#loading-overlay').addClass('d-none');
                }
            },

            async update(newPosts) {
                try {
                    $('#loading-overlay').removeClass('d-none');
                    const res = await $.ajax({
                        url: this.getBaseUrl(),
                        method: 'PUT',
                        headers: {
                            "Authorization": `Bearer ${CONFIG.token}`,
                            "Content-Type": "application/json"
                        },
                        data: JSON.stringify({
                            message: `Update by ${State.currentUser}`,
                            content: Base64Helper.encode(JSON.stringify({ posts: newPosts }, null, 2)),
                            sha: State.currentSha
                        })
                    });
                    State.currentSha = res.content.sha;
                    State.posts = newPosts;
                    BBS.render();
                    bootstrap.Modal.getInstance(document.getElementById('postModal')).hide();
                } catch (error) {
                    alert('儲存失敗！');
                    console.error(error);
                } finally {
                    $('#loading-overlay').addClass('d-none');
                }
            }
        };

        const BBS = {
            init() {

                const roleName = State.role === 'admin' ? '管理員' : '使用者';
                $('#user-info-badge').text(`你好，${State.currentUser} (${roleName})`);


                GitHubAPI.fetch();
            },
            render() {
                const $list = $('#post-list');
                $list.empty();

                if (State.posts.length === 0) {
                    $list.append('<div class="col-12 text-center text-muted mt-5">目前沒有任何文章</div>');
                    return;
                }
                const sortedPosts = [...State.posts].sort((a, b) => b.timestamp - a.timestamp);

                sortedPosts.forEach(post => {

                    const canEdit = State.role === 'admin' || (State.role === 'user' && post.author === State.currentUser);
                    const actionButtons = canEdit ? `
                        <div class="mt-3 text-end border-top pt-2">
                            <button class="btn btn-outline-secondary btn-sm btn-edit" data-id="${post.id}">編輯</button>
                            <button class="btn btn-outline-danger btn-sm btn-delete" data-id="${post.id}">刪除</button>
                        </div>
                    ` : '';
                    const dateStr = new Date(post.timestamp).toLocaleString('zh-TW');


                    const safeTitle = $('<div>').text(post.title).html();
                    const safeAuthor = $('<div>').text(post.author).html();
                    const safeContent = $('<div>').text(post.content).html();

                    $list.append(`
                        <div class="col-md-6 mb-4 post-item">
                            <div class="card h-100 post-card">
                                <div class="card-body d-flex flex-column">
                                    <h5 class="card-title text-primary post-title">${safeTitle}</h5>
                                    <h6 class="card-subtitle mb-2 text-muted small">作者：${safeAuthor} | 🕒 ${dateStr}</h6>
                                    <p class="card-text post-content flex-grow-1 mt-2" style="white-space: pre-wrap;">${safeContent}</p>
                                    ${actionButtons}
                                </div>
                            </div>
                        </div>
                    `);
                });
            }
        };

        $(document).ready(() => {


            $('#link-to-register').click((e) => { e.preventDefault(); ViewManager.show('view-register'); });
            $('#link-to-login').click((e) => { e.preventDefault(); ViewManager.show('view-login'); });

            $('#form-login').submit((e) => {
                e.preventDefault();
                const acc = $('#login-acc').val().trim();
                const pass = $('#login-pass').val().trim();

                if (Auth.login(acc, pass)) {
                    $('#login-acc').val('');
                    $('#login-pass').val('');
                    ViewManager.show('view-bbs');
                    BBS.init();
                } else {
                    alert('帳號或密碼錯誤！');
                }
            });

            $('#form-register').submit((e) => {
                e.preventDefault();
                alert('這是一個功能展示，註冊功能為模擬狀態。請使用現有帳號登入。');
                ViewManager.show('view-login');
            });

            $('#btn-logout').click(() => {
                Auth.logout();
                ViewManager.show('view-login');
            });

            $('#search-input').on('keyup', function () {
                const val = $(this).val().toLowerCase();
                $(".post-item").filter(function () {
                    const textToSearch = $(this).find('.post-title, .post-content').text().toLowerCase();
                    $(this).toggle(textToSearch.indexOf(val) > -1);
                });
            });

            $('#btn-new-post').on('click', () => {
                $('#modal-title').text('新增文章');
                $('#post-id').val('');
                $('#post-title').val('');
                $('#post-content').val('');
            });

            $('#btn-save-post').on('click', () => {
                const id = $('#post-id').val();
                const title = $('#post-title').val().trim();
                const content = $('#post-content').val().trim();

                if (!title || !content) return alert('標題與內容不能為空！');

                let updatedPosts = [...State.posts];

                if (id) {
                    const index = updatedPosts.findIndex(p => p.id === id);
                    if (index !== -1) updatedPosts[index] = { ...updatedPosts[index], title, content };
                } else {
                    updatedPosts.push({
                        id: Date.now().toString(),
                        title,
                        content,
                        author: State.currentUser,
                        timestamp: Date.now()
                    });
                }
                GitHubAPI.update(updatedPosts);
            });

            $('#post-list').on('click', '.btn-edit', function () {
                const id = String($(this).data('id'));
                const post = State.posts.find(p => p.id === id);
                if (post) {
                    $('#modal-title').text('編輯文章');
                    $('#post-id').val(post.id);
                    $('#post-title').val(post.title);
                    $('#post-content').val(post.content);
                    new bootstrap.Modal(document.getElementById('postModal')).show();
                }
            });

            $('#post-list').on('click', '.btn-delete', function () {
                if (confirm('確定要刪除這篇文章嗎？此動作無法復原。')) {
                    const id = String($(this).data('id'));
                    const updatedPosts = State.posts.filter(p => p.id !== id);
                    GitHubAPI.update(updatedPosts);
                }
            });
        });

    </script>
</body>

</html>
